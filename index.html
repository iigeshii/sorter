<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Minecraft Sorter Layout</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel2: rgba(15,22,32,.65);
      --border: rgba(255,255,255,.10);
      --text: #e7eefc;
      --muted: rgba(231,238,252,.65);
      --muted2: rgba(231,238,252,.45);
      --shadow: 0 10px 30px rgba(0,0,0,.55);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --gap: 10px;
      --slot: 18px;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1100px 700px at 25% 0%, rgba(122,162,255,.12), transparent 60%),
        radial-gradient(900px 650px at 85% 20%, rgba(45,212,191,.10), transparent 60%),
        var(--bg);
    }

    /* ---------------- HEADER ---------------- */
    header {
      padding: 16px 18px 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
    }

    header > .titleWrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
    }

    header > .centerControls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    .sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    input[type="search"],
    .btn {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
    }

    input[type="search"] {
      min-width: 300px;
    }

    .btn {
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255,255,255,.09);
    }

    /* ---------------- MAIN LAYOUT ---------------- */
    main {
      padding: 0 18px 18px;
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    /* ---------------- DIRECTORY ---------------- */
    .dir {
      padding: 10px;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .dirHeader {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 10px;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
    }

    .meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    details.cat {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      margin: 8px 4px;
      background: rgba(255,255,255,.03);
    }

    summary {
      cursor: pointer;
      padding: 10px;
      display: flex;
      justify-content: space-between;
    }

    .catName {
      font-size: 12px;
      font-weight: 600;
    }

    .count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .items {
      padding: 0 10px 10px;
      display: grid;
      gap: 6px;
    }

    .itemBtn {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 7px 8px;
      text-align: left;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
    }

    .itemBtn small {
      font-family: var(--mono);
      color: var(--muted2);
    }

    /* ---------------- BOARD ---------------- */
    .board {
      padding: 12px;
      overflow: auto;
    }

    .columns {
      display: flex;
      gap: var(--gap);
      align-items: flex-start;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 110px;
    }

    /* ---------------- POD ---------------- */
    .pod {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pod.selected {
      outline: 2px solid rgba(122,162,255, 0.6);
      outline-offset: 2px;
    }

    .wall {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      background: rgba(255,255,255,.03);
      padding: 4px;
      margin-top: 10px;
    }

    /* FIXED HEADER HEIGHT — KEY ALIGNMENT FIX */
    .podHeader {
      min-height: 42px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .podId {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .podCat {
      font-size: 11px;
      color: var(--muted2);
      white-space: normal;
      word-break: break-word;
    }

    /* ---------------- SLOT GRID ---------------- */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, var(--slot));
      grid-template-rows: repeat(3, var(--slot));
      gap: 6px;
      justify-content: center;
    }

    .slot {
      width: var(--slot);
      height: var(--slot);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      cursor: pointer;
      position: relative;
    }

    .slot.unused {
      opacity: 0.35;
      cursor: default;
    }

    .slot.hasItem::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
    }

    .slot.selected {
      box-shadow: 0 0 0 2px rgba(45,212,191,.6);
    }

    /* ---------------- DETAILS ---------------- */
    .details {
      padding: 12px 14px;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .details h2 {
      margin: 0;
      font-size: 14px;
    }

    .kv {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 10px;
      font-family: var(--mono);
      font-size: 12px;
      margin-top: 10px;
    }

    .k { color: var(--muted); }

    /* ---------------- SLOT INVENTORY INDICATORS ---------------- */
    .slot.hasInv::after    { background: #4ade80; }
    .slot.hasMismatch::after { background: #fb923c; }

    /* ---------------- ACTUAL CONTENTS (DETAILS PANEL) ---------------- */
    .invSection {
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 12px;
    }

    .invItemRow {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--mono);
      gap: 8px;
    }

    .invItemRow.mismatch {
      background: rgba(251,146,60,.12);
      border: 1px solid rgba(251,146,60,.25);
      margin: 1px 0;
    }

    .invName { color: var(--text); flex: 1; }
    .invCount { color: var(--muted2); font-size: 11px; white-space: nowrap; }
    .invEmpty { font-size: 12px; color: var(--muted2); font-style: italic; padding: 4px 6px; }

    /* ---------------- DISCREPANCIES (DIRECTORY PANEL) ---------------- */
    .discDetails {
      border: 1px solid rgba(251,146,60,.3);
      border-radius: 12px;
      margin: 0 4px 10px;
      background: rgba(251,146,60,.05);
    }

    .discSummary {
      cursor: pointer;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .discTitle { font-size: 12px; font-weight: 600; color: #fb923c; }

    .discList { padding: 0 10px 10px; display: grid; gap: 6px; }

    .discEntry {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(251,146,60,.2);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      width: 100%;
    }

    .discEntry:hover { background: rgba(255,255,255,.07); }

    .discEntryHeader {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 2px;
    }

    .discEntryDesc {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 3px;
    }

    .discEntryItems {
      font-size: 11px;
      color: #fb923c;
      font-family: var(--mono);
    }

    .itemsList {
      margin: 2px 0 0 0;
      padding-left: 1.1em;
      list-style: disc;
    }
    .itemsList li {
      line-height: 1.7;
      font-size: 11px;
    }

    /* ---------------- POD INVENTORY ---------------- */
    .podSection {
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 12px;
    }

    .podSectionTitle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .podSlotRow {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .podSlotRow:hover { background: rgba(255,255,255,.06); }

    .podSlotRow.active {
      background: rgba(122,162,255,.12);
      border-color: rgba(122,162,255,.3);
    }

    .podSlotNum {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      min-width: 14px;
      text-align: right;
    }

    .podSlotDesc { color: var(--text); }

    .podSlotRow.empty {
      cursor: default;
    }

    .podSlotRow.empty .podSlotDesc {
      color: var(--muted2);
      font-style: italic;
    }

    /* ---------------- RESPONSIVE ---------------- */
    @media (max-width: 1300px) {
      main { grid-template-columns: 1fr; }
      .dir, .board, .details { max-height: none; }
    }

    @media (max-width: 700px) {
      header {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }
      .titleWrap { align-items: center; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
</head>
<body>
<header>
  <div class="titleWrap">
    <h1>Minecraft Sorter Layout</h1>
    <div class="sub">Search filters the directory + layout. Click to view details.</div>
  </div>

  <div class="centerControls">
    <input id="search" type="search" placeholder="Search item or category…" />
    <button class="btn" id="clear">Clear</button>
  </div>
</header>

<main>
  <section class="panel dir">
    <div class="dirHeader">
      <div class="title">Directory</div>
      <div class="meta" id="dirMeta">—</div>
    </div>
    <details class="discDetails" id="discSection" style="display:none">
      <summary class="discSummary">
        <span class="discTitle">⚠ Discrepancies</span>
        <span class="meta" id="discMeta"></span>
      </summary>
      <div id="discList" class="discList"></div>
    </details>
    <div id="dirList"></div>
  </section>

  <section class="panel board">
    <div id="walls"></div>
    <div class="status" id="status"></div>
  </section>

  <section class="panel details" id="details">
    <h2>Selection</h2>
    <div class="kv">
      <div class="k">ChestID</div><div id="dChest">—</div>
      <div class="k">Category</div><div id="dCat">—</div>
      <div class="k">Description</div><div id="dDesc">—</div>
    </div>
    <div class="podSection" id="dPodSection" style="display:none">
      <div class="podSectionTitle">All slots in <span id="dPodId"></span></div>
      <div id="dPodList"></div>
    </div>
    <div class="invSection" id="dInvSection" style="display:none">
      <div class="podSectionTitle">Actual Contents</div>
      <div id="dInvList"></div>
    </div>
  </section>
</main>

<script>
  // --------------------------
  // URL HASH STATE
  // --------------------------
  function updateURLHash() {
    const params = new URLSearchParams();
    if (ACTIVE_FILTER) params.set("q", ACTIVE_FILTER);
    if (SELECTED) params.set("chest", SELECTED);
    const str = params.toString();
    history.replaceState(null, "", str ? "#" + str : location.pathname + location.search);
  }

  function applyURLHash() {
    const hash = location.hash.slice(1);
    if (!hash) return;
    const params = new URLSearchParams(hash);
    const q = params.get("q");
    const chest = params.get("chest");
    if (q) { elSearch.value = q; ACTIVE_FILTER = q; }
    if (chest) SELECTED = chest;
  }

  // --------------------------
  // WALL DEFINITIONS
  // --------------------------
  const WALLS = [
    { name: "East wall",  range: "A–I", letters: "ABCDEFGHI".split("") },
    { name: "South wall", range: "J–O", letters: "JKLMNO".split("") },
    { name: "West wall",  range: "P–X", letters: "PQRSTUVWX".split("") },
  ];

  function binId(letter, pod) { return `${letter}${pod}`; }
  function slotOrder() { return [1,2,3,4,5,6,7,8,9]; }

  function hashHue(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h % 360;
  }

  function slotColor(category) {
    if (!category || category === "UNUSED") {
      return { bg: "rgba(255,255,255,.03)", border: "rgba(255,255,255,.08)" };
    }
    const hue = hashHue(category);
    return { bg: `hsla(${hue}, 70%, 55%, .18)`, border: `hsla(${hue}, 70%, 60%, .45)` };
  }

  // --------------------------
  // STATE
  // --------------------------
  const elWalls = document.getElementById("walls");
  const elStatus = document.getElementById("status");
  const elDirList = document.getElementById("dirList");
  const elDirMeta = document.getElementById("dirMeta");

  const elSearch = document.getElementById("search");
  const elClear = document.getElementById("clear");

  const elDChest = document.getElementById("dChest");
  const elDCat = document.getElementById("dCat");
  const elDDesc = document.getElementById("dDesc");
  const elDPodSection = document.getElementById("dPodSection");
  const elDPodId = document.getElementById("dPodId");
  const elDPodList = document.getElementById("dPodList");
  const elDInvSection = document.getElementById("dInvSection");
  const elDInvList = document.getElementById("dInvList");
  const elDiscSection = document.getElementById("discSection");
  const elDiscList = document.getElementById("discList");
  const elDiscMeta = document.getElementById("discMeta");

  let DATA = [];
  let INDEX = new Map();         // chestId -> row
  let CAT_INDEX = new Map();     // category -> Set(desc)
  let DESC_TO_CHEST = new Map(); // desc(lower) -> first chestId
  let SELECTED = null;
  let ACTIVE_FILTER = "";

  let INVENTORY = new Map();     // chestId -> [{itemName, totalCount, directCount, shulkerCount}]
  let INV_LOADED = false;
  let DISCREPANCIES = [];        // [{chestId, row, items}] — items that don't belong

  // --------------------------
  // INVENTORY HELPERS
  // --------------------------

  function idToDisplay(id) {
    return (id || "")
      .replace(/^minecraft:/, "")
      .replace(/_/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function itemBelongsInChest(row, itemName) {
    if (!row || !itemName) return null;
    if (row.category === "UNUSED") return false;
    // Exact match against the Items field (Minecraft IDs)
    if (row.items) {
      const expected = new Set(row.items.split("|").map(s => s.trim().toLowerCase()));
      return expected.has(itemName.toLowerCase()) ? true : false;
    }
    // Fuzzy: check if any significant word overlaps between display name and Description
    if (!row.desc) return null;
    const display = idToDisplay(itemName).toLowerCase();
    const desc = row.desc.toLowerCase();
    const displayWords = display.split(" ").filter(w => w.length > 2);
    const descWords = desc.split(/[\s,&()/]+/).filter(w => w.length > 2);
    const hasMatch = displayWords.some(w => desc.includes(w)) || descWords.some(w => display.includes(w));
    return hasMatch ? null : false; // null = unclear, false = likely wrong chest
  }

  function buildDiscrepancies() {
    DISCREPANCIES = [];
    for (const [chestId, items] of INVENTORY) {
      if (!items.length) continue;
      const row = INDEX.get(chestId);
      const misfits = items.filter(item => itemBelongsInChest(row, item.itemName) === false);
      if (misfits.length) DISCREPANCIES.push({ chestId, row, items: misfits });
    }
    DISCREPANCIES.sort((a, b) => a.chestId.localeCompare(b.chestId));
  }

  async function loadInventory() {
    try {
      const res = await fetch("actual_inventory.csv", { cache: "no-store" });
      if (!res.ok) return;
      const text = await res.text();
      const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
      INVENTORY = new Map();
      for (const r of data) {
        const cid = r["ChestID"] ?? "";
        if (!INVENTORY.has(cid)) INVENTORY.set(cid, []);
        INVENTORY.get(cid).push({
          itemName:     (r["ItemName"] ?? "").trim(),
          totalCount:   parseInt(r["TotalCount"])  || 0,
          directCount:  parseInt(r["DirectCount"]) || 0,
          shulkerCount: parseInt(r["ShulkerCount"]) || 0,
        });
      }
      INV_LOADED = true;
      buildDiscrepancies();
      renderAll();
    } catch(e) {
      // No inventory file present — silently skip
    }
  }

  function renderDiscrepancies() {
    if (!INV_LOADED || !DISCREPANCIES.length) {
      elDiscSection.style.display = "none";
      return;
    }
    elDiscSection.style.display = "";
    elDiscMeta.textContent = `${DISCREPANCIES.length} chest${DISCREPANCIES.length !== 1 ? "s" : ""}`;
    elDiscList.innerHTML = "";
    for (const d of DISCREPANCIES) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "discEntry";
      btn.addEventListener("click", () => selectChest(d.chestId));

      const header = document.createElement("div");
      header.className = "discEntryHeader";
      header.textContent = `${d.chestId}  •  ${d.row?.category ?? "?"}`;

      const desc = document.createElement("div");
      desc.className = "discEntryDesc";
      desc.textContent = d.row?.desc || "(no description)";

      const items = document.createElement("div");
      items.className = "discEntryItems";
      items.textContent = d.items
        .map(i => `${idToDisplay(i.itemName)} ×${i.totalCount.toLocaleString()}`)
        .join("  •  ");

      btn.appendChild(header);
      btn.appendChild(desc);
      btn.appendChild(items);
      elDiscList.appendChild(btn);
    }
  }

  function buildIndexes(rows) {
    INDEX = new Map();
    CAT_INDEX = new Map();
    DESC_TO_CHEST = new Map();

    for (const r of rows) {
      INDEX.set(r.chestId, r);

      if (!CAT_INDEX.has(r.category)) CAT_INDEX.set(r.category, new Set());

      const itemList = r.items ? r.items.split("|").map(s => s.trim()).filter(Boolean) : [];
      if (itemList.length) {
        for (const item of itemList) {
          CAT_INDEX.get(r.category).add(item);
          const k = item.toLowerCase();
          if (!DESC_TO_CHEST.has(k)) DESC_TO_CHEST.set(k, r.chestId);
        }
        const descKey = (r.desc || "").toLowerCase();
        if (descKey && !DESC_TO_CHEST.has(descKey)) DESC_TO_CHEST.set(descKey, r.chestId);
      } else if (r.desc) {
        CAT_INDEX.get(r.category).add(r.desc);
        const key = r.desc.toLowerCase();
        if (!DESC_TO_CHEST.has(key)) DESC_TO_CHEST.set(key, r.chestId);
      }
    }
  }

  function getRow(chestId) { return INDEX.get(chestId); }

  function setDetails(row) {
    if (!row) {
      elDChest.textContent = "—";
      elDCat.textContent = "—";
      elDDesc.textContent = "—";
      elDPodSection.style.display = "none";
      elDInvSection.style.display = "none";
      return;
    }
    elDChest.textContent = row.chestId || "—";
    elDCat.textContent = row.category || "—";
    if (row.items) {
      elDDesc.innerHTML = "";
      const ul = document.createElement("ul");
      ul.className = "itemsList";
      for (const item of row.items.split("|").map(s => s.trim()).filter(Boolean)) {
        const li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
      }
      elDDesc.appendChild(ul);
    } else {
      elDDesc.textContent = row.desc || "—";
    }

    const bin = row.chestId.replace(/-\d+$/, "");
    elDPodId.textContent = bin;
    elDPodList.innerHTML = "";
    for (let n = 1; n <= 9; n++) {
      const cid = `${bin}-${n}`;
      const r = getRow(cid);
      const isEmpty = !r?.desc && !r?.items;
      const slotLabel = r?.items
        ? r.items.split("|").map(s => s.trim()).filter(Boolean).join(" · ")
        : (r?.desc || "empty");
      const div = document.createElement("div");
      div.className = "podSlotRow" + (cid === row.chestId ? " active" : "") + (isEmpty ? " empty" : "");
      div.innerHTML = `<span class="podSlotNum">${n}</span><span class="podSlotDesc">${escapeHtml(slotLabel)}</span>`;
      if (!isEmpty) div.addEventListener("click", () => selectChest(cid));
      elDPodList.appendChild(div);
    }
    elDPodSection.style.display = "";

    // Actual inventory contents
    if (INV_LOADED) {
      elDInvSection.style.display = "";
      elDInvList.innerHTML = "";
      const invItems = INVENTORY.get(row.chestId) || [];
      if (!invItems.length) {
        const e = document.createElement("div");
        e.className = "invEmpty";
        e.textContent = "Empty";
        elDInvList.appendChild(e);
      } else {
        for (const item of invItems) {
          const div = document.createElement("div");
          div.className = "invItemRow";
          const belongs = itemBelongsInChest(row, item.itemName);
          if (belongs === false) div.classList.add("mismatch");
          let countStr = item.totalCount.toLocaleString();
          if (item.shulkerCount > 0) countStr += ` (${item.shulkerCount.toLocaleString()} in shulkers)`;
          div.innerHTML = `<span class="invName">${escapeHtml(idToDisplay(item.itemName))}</span><span class="invCount">${countStr}</span>`;
          elDInvList.appendChild(div);
        }
      }
    } else {
      elDInvSection.style.display = "none";
    }
  }

  function clearSelection() {
    SELECTED = null;
    document.querySelectorAll(".slot.selected").forEach(x => x.classList.remove("selected"));
    document.querySelectorAll(".pod.selected").forEach(x => x.classList.remove("selected"));
    setDetails(null);
  }

  function matchesFilterText(s, q) {
    if (!q) return true;
    return (s || "").toLowerCase().includes(q);
  }

  function matchesRowFilter(row, q) {
    if (!q) return true;
    q = q.toLowerCase();
    return matchesFilterText(row.category, q) || matchesFilterText(row.desc, q) || matchesFilterText(row.items, q);
  }

  function selectChest(chestId) {
    const row = getRow(chestId);
    if (!row) return;

    // update state first
    SELECTED = chestId;
    setDetails(row);
    updateURLHash();

    // IMPORTANT: re-render so dim/opacity updates for the new selection
    // (renderAll() is fine too, but walls-only is usually enough)
    renderWalls();

    // Scroll to the newly selected slot (must happen after renderWalls)
    const slotEl = document.querySelector(`.slot[data-chest="${CSS.escape(chestId)}"]`);
    slotEl?.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
  }


  // --------------------------
  // DIRECTORY RENDER
  // --------------------------
  function renderDirectory() {
    elDirList.innerHTML = "";

    const cats = Array.from(CAT_INDEX.keys()).sort((a,b)=>a.localeCompare(b, undefined, { sensitivity: "base" }));

    let visibleCats = 0;
    let visibleItems = 0;

    for (const cat of cats) {
      const items = Array.from(CAT_INDEX.get(cat) || []).sort((a,b)=>a.localeCompare(b, undefined, { sensitivity: "base" }));

      const q = ACTIVE_FILTER.trim().toLowerCase();
      const catMatches = matchesFilterText(cat, q);
      const filteredItems = q ? items.filter(it => matchesFilterText(it, q) || catMatches) : items;

      if (!filteredItems.length && !catMatches) continue;

      visibleCats += 1;
      visibleItems += filteredItems.length;

      const det = document.createElement("details");
      det.className = "cat";
      if (q && (catMatches || filteredItems.length)) det.open = true;

      const sum = document.createElement("summary");

      const left = document.createElement("div");
      left.className = "catName";
      left.textContent = cat;

      const right = document.createElement("div");
      right.className = "count";
      right.textContent = q ? `${filteredItems.length} / ${items.length}` : `${items.length}`;

      sum.appendChild(left);
      sum.appendChild(right);
      det.appendChild(sum);

      const wrap = document.createElement("div");
      wrap.className = "items";

      for (const it of filteredItems) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "itemBtn";
        const chestId = DESC_TO_CHEST.get(it.toLowerCase()) ?? "—";
        btn.innerHTML = `<span>${escapeHtml(it)}</span><small>${chestId}</small>`;
        btn.addEventListener("click", () => {
          const cid = DESC_TO_CHEST.get(it.toLowerCase());
          if (cid) selectChest(cid);
        });
        wrap.appendChild(btn);
      }

      det.appendChild(wrap);
      elDirList.appendChild(det);
    }

    const allCats = Array.from(CAT_INDEX.keys()).filter(c => c !== "UNUSED");
    const totalCatsCount = allCats.length;
    const totalItemsCount = allCats.reduce((sum, c) => sum + (CAT_INDEX.get(c)?.size ?? 0), 0);
    if (ACTIVE_FILTER) {
      elDirMeta.textContent = `${visibleCats} / ${totalCatsCount} cats • ${visibleItems} / ${totalItemsCount} items`;
    } else {
      elDirMeta.textContent = `${totalCatsCount} cats • ${totalItemsCount} items`;
    }
  }

  function escapeHtml(s) {
    return (s || "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  // --------------------------
  // LAYOUT RENDER (WALLS)
  // --------------------------
  function renderWalls() {
    elWalls.innerHTML = "";

    for (const wall of WALLS) {
      const wallWrap = document.createElement("div");
      wallWrap.className = "wall";

      const cols = document.createElement("div");
      cols.className = "columns";

      for (const letter of wall.letters) {
        const col = document.createElement("div");
        col.className = "col";

        for (const pod of [1, 2]) {
          const bin = binId(letter, pod);
          const podWrap = document.createElement("div");
          podWrap.className = "pod";

          // POD HEADER
          const head2 = document.createElement("div");
          head2.className = "podHeader";

          const podId = document.createElement("div");
          podId.className = "podId";
          podId.textContent = bin;

          const firstRow = getRow(`${bin}-1`);
          const cat = firstRow?.category ?? "UNUSED";

          const podCat = document.createElement("div");
          podCat.className = "podCat";
          podCat.title = cat;
          podCat.textContent = cat;

          head2.appendChild(podId);
          head2.appendChild(podCat);
          podWrap.appendChild(head2);

          // GRID
          const grid = document.createElement("div");
          grid.className = "grid";

          let podHasMatch = false;

          for (const n of slotOrder()) {
            const chestId = `${bin}-${n}`;
            const row = getRow(chestId);

            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "slot";
            btn.dataset.chest = chestId;
            btn.setAttribute("aria-label", chestId);

            const category = row?.category ?? "UNUSED";
            const desc = row?.desc ?? "";

            if (category === "UNUSED") btn.classList.add("unused");
            const tooltip = row?.items
              ? row.items.split("|").map(s => s.trim()).filter(Boolean).join("\n")
              : desc;
            if (tooltip) { btn.classList.add("hasItem"); btn.title = tooltip; }

            if (INV_LOADED) {
              const invItems = INVENTORY.get(chestId) || [];
              if (invItems.length) {
                btn.classList.add("hasInv");
                if (invItems.some(item => itemBelongsInChest(row, item.itemName) === false)) {
                  btn.classList.add("hasMismatch");
                }
              }
            }

            const c = slotColor(category);
            btn.style.background = c.bg;
            btn.style.borderColor = c.border;

            const isMatch = row ? matchesRowFilter(row, ACTIVE_FILTER) : false;
            const isSelected = chestId === SELECTED;

            // DIM LOGIC — never dim the selected slot
            if (ACTIVE_FILTER && row && !isSelected) {
              if (!isMatch || SELECTED) {
                btn.style.opacity = "0.22";
              }
            }

            if (isMatch) podHasMatch = true;

            // SELECTION
            if (isSelected) {
              btn.classList.add("selected");
              podWrap.classList.add("selected");
            }

            btn.addEventListener("click", () => {
              if (!row) return;
              selectChest(chestId);
            });

            grid.appendChild(btn);
          }

          // POD HIGHLIGHT
          const isSelectedPod = SELECTED?.startsWith(`${bin}-`);
          if (isSelectedPod || (!SELECTED && podHasMatch && ACTIVE_FILTER)) {
            // only highlight matches during an active filter
            podWrap.classList.add("selected");
          }

          podWrap.appendChild(grid);
          col.appendChild(podWrap);
        }

        cols.appendChild(col);
      }

      wallWrap.appendChild(cols);
      elWalls.appendChild(wallWrap);
    }
  }

  function renderAll() {
    renderDirectory();
    renderWalls();
    renderDiscrepancies();
  }

  async function reload() {
    elStatus.textContent = "Loading sorter_layout.csv…";
    try {
      const res = await fetch("sorter_layout.csv", { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
      DATA = data.map(r => {
        const col     = (r["Column"]  ?? "").trim();
        const cluster = (r["Cluster"] ?? "").trim();
        const number  = (r["Number"]  ?? "").trim();
        return {
          chestId:  `${col}${cluster}-${number}`,
          col,
          cluster,
          number,
          category: (r["Categories"] ?? "UNUSED").trim() || "UNUSED",
          desc:     (r["Description"] ?? "").trim(),
          items:    (r["Items"] ?? "").trim(),
        };
      });
      buildIndexes(DATA);
      applyURLHash();
      elStatus.textContent = "";
      renderAll();
      if (SELECTED) {
        const slotEl = document.querySelector(`.slot[data-chest="${CSS.escape(SELECTED)}"]`);
        slotEl?.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
      }
    } catch (e) {
      elStatus.textContent = `ERROR: ${e.message}`;
      console.error(e);
    }
  }

  // --------------------------
  // SEARCH RESET BEHAVIOR
  // --------------------------
  function resetFilterAndView() {
    elSearch.value = "";
    ACTIVE_FILTER = "";
    clearSelection();
    renderAll();
    updateURLHash();
  }

  // Typing/backspacing – debounced 150ms
  let _searchTimer = null;
  elSearch.addEventListener("input", () => {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => {
      const v = elSearch.value.trim();
      if (v === "") { resetFilterAndView(); return; }
      ACTIVE_FILTER = v;
      renderAll();
      updateURLHash();
    }, 150);
  });

  // Clicking the built-in "x" clear icon (type="search")
  elSearch.addEventListener("search", () => {
    if (elSearch.value.trim() === "") resetFilterAndView();
  });

  // Escape clears the search
  elSearch.addEventListener("keydown", e => {
    if (e.key === "Escape") resetFilterAndView();
  });

  // Arrow key navigation through directory item buttons
  elDirList.addEventListener("keydown", e => {
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    e.preventDefault();
    const btns = Array.from(elDirList.querySelectorAll(".itemBtn"));
    const i = btns.indexOf(document.activeElement);
    if (e.key === "ArrowDown") btns[Math.min(i + 1, btns.length - 1)]?.focus();
    else btns[Math.max(i - 1, 0)]?.focus();
  });

  // Clear button
  elClear.addEventListener("click", resetFilterAndView);

  // "/" focuses the search box
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement !== elSearch) {
      e.preventDefault();
      elSearch.focus();
      elSearch.select();
    }
  });

  // initial load — inventory loads after layout so INDEX is ready for discrepancy checks
  reload().then(loadInventory);
</script>
</body>
</html>
